  /api/audit/logs/:
    get:
      operationId: audit_logs_list
      description: |-
        API endpoints for audit logs (read-only)

        list: GET /api/audit/logs/
        retrieve: GET /api/audit/logs/{id}/
        by_entity: GET /api/audit/logs/by-entity/?entity_type=VettingCase&entity_id=1
        by_user: GET /api/audit/logs/by-user/?user_id=1
      parameters:
      - in: query
        name: action
        schema:
          type: string
          enum:
          - create
          - delete
          - login
          - logout
          - other
          - update
        description: |-
          * `create` - Create
          * `update` - Update
          * `delete` - Delete
          * `login` - Login
          * `logout` - Logout
          * `other` - Other
      - in: query
        name: entity_id
        schema:
          type: string
      - in: query
        name: entity_type
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - audit
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
  /api/audit/logs/{id}/:
    get:
      operationId: audit_logs_retrieve
