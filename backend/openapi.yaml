  /api/appointments/records/:
    get:
      operationId: appointments_records_list
      parameters:
      - in: query
        name: appointment_exercise
        schema:
          type: string
          format: uuid
      - in: query
        name: is_public
        schema:
          type: boolean
      - in: query
        name: nominee
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: position
        schema:
          type: string
          format: uuid
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - appointed
          - committee_review
          - confirmation_pending
          - exited
          - nominated
          - rejected
          - serving
          - under_vetting
          - withdrawn
        description: |-
          * `nominated` - Nominated
          * `under_vetting` - Under Vetting
          * `committee_review` - Committee Review
          * `confirmation_pending` - Awaiting Parliamentary Confirmation
          * `appointed` - Appointed
          * `rejected` - Rejected
          * `withdrawn` - Withdrawn
          * `serving` - Serving
          * `exited` - Exited
      tags:
      - appointments
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentRecordList'
          description: ''
