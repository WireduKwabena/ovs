openapi: 3.0.3
info:
  title: AI Vetting System API
  version: 1.0.0
  description: API schema for campaign orchestration and vetting workflows.
paths:
  /api/admin/analytics/:
    get:
      operationId: admin_analytics_retrieve
      description: |-
        Detailed analytics for admin
        GET /api/admin/analytics/
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAnalyticsResponse'
          description: ''
  /api/admin/cases/:
    get:
      operationId: admin_cases_retrieve
      description: |-
        Get all cases for admin review
        GET /api/admin/cases/
        Supports filtering: ?status=pending&application_type=employment
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCasesResponse'
          description: ''
  /api/admin/dashboard/:
    get:
      operationId: admin_dashboard_retrieve
      description: |-
        Main admin dashboard with statistics
        GET /api/admin/dashboard/
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
          description: ''
  /api/admin/users/:
    get:
      operationId: admin_users_retrieve
      description: |-
        List users for admin management.
        GET /api/admin/users/
        Supports filtering: ?q=email_or_name&user_type=admin|internal|applicant&is_active=true|false
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersResponse'
          description: ''
  /api/admin/users/{user_id}/:
    patch:
      operationId: admin_users_partial_update
      description: |-
        Partially update an admin-managed user.
        PATCH /api/admin/users/<uuid:user_id>/
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminManagedUser'
          description: ''
  /api/ai-monitor/check-social-profiles/:
    post:
      operationId: ai_monitor_check_social_profiles_create
      description: Run advisory social profile checks for a case.
      tags:
      - ai-monitor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialProfileCheck'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SocialProfileCheck'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SocialProfileCheck'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/ai-monitor/classify-document/:
    post:
      operationId: ai_monitor_classify_document_create
      description: |-
        Classify document image into RVL-CDIP/MIDV-500 taxonomy.

        Access:
        - authenticated admin/staff user
      tags:
      - ai-monitor
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentClassificationUpload'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentClassificationUpload'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/ai-monitor/health/:
    get:
      operationId: ai_monitor_health_retrieve
      description: |-
        Runtime health snapshot for AI monitoring backend.

        Access:
        - authenticated admin/staff user
      parameters:
      - in: query
        name: model_name
        schema:
          type: string
          default: default
          minLength: 1
      tags:
      - ai-monitor
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
