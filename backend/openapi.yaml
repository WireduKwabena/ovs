components:
  schemas:
    AcceptInvitation:
      type: object
      properties:
        token:
          type: string
          format: uuid
      required:
      - token
    AdminAnalyticsResponse:
      type: object
      properties:
        status_distribution:
          type: array
          items:
            $ref: '#/components/schemas/DistributionItem'
        type_distribution:
          type: array
          items:
            $ref: '#/components/schemas/DistributionItem'
        priority_distribution:
          type: array
          items:
            $ref: '#/components/schemas/DistributionItem'
        rubric_statistics:
          $ref: '#/components/schemas/RubricStatistics'
        monthly_trend:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyTrendItem'
        total_applications:
          type: integer
        total_users:
          type: integer
      required:
      - monthly_trend
      - priority_distribution
      - rubric_statistics
      - status_distribution
      - total_applications
      - total_users
      - type_distribution
    AdminAuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AdminUser'
        tokens:
          $ref: '#/components/schemas/TokenPair'
        user_type:
          $ref: '#/components/schemas/UserTypeEnum'
        backup_codes:
          type: array
          items:
            type: string
      required:
      - tokens
      - user
      - user_type
    AdminCasesResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/VettingCaseAdmin'
        count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        ordering:
          type: string
      required:
      - count
      - page
      - page_size
      - results
      - total_pages
    AdminDashboardResponse:
      type: object
      properties:
        total_applications:
          type: integer
        pending:
          type: integer
        under_review:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        recent_applications:
          type: array
          items:
            $ref: '#/components/schemas/DashboardRecentApplication'
        documents:
          $ref: '#/components/schemas/DashboardDocuments'
        fraud_detection:
          $ref: '#/components/schemas/DashboardFraud'
        trends:
          $ref: '#/components/schemas/DashboardTrends'
      required:
      - approved
      - documents
      - fraud_detection
      - pending
      - recent_applications
      - rejected
      - total_applications
      - trends
      - under_review
    AdminLogin:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    AdminLoginResponse:
      oneOf:
      - $ref: '#/components/schemas/AdminAuthResponse'
      - $ref: '#/components/schemas/TwoFactorChallenge'
    AdminManagedUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        full_name:
          type: string
          readOnly: true
        user_type:
          $ref: '#/components/schemas/UserTypeEnum'
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_staff:
          type: boolean
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        is_two_factor_enabled:
          type: boolean
        last_login:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - full_name
      - id
      - updated_at
    AdminUser:
      type: object
      description: Serializer for admin users
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        full_name:
          type: string
          readOnly: true
        phone_number:
          type: string
          pattern: ^\+?1?\d{9,15}$
          maxLength: 20
        organization:
          type: string
          maxLength: 200
        department:
          type: string
          maxLength: 100
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          readOnly: true
        role_display:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_staff:
          type: boolean
          readOnly: true
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          readOnly: true
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        created_at:
          type: string
          format: date-time
          readOnly: true
        profile:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
      required:
      - created_at
      - email
      - full_name
      - id
      - is_active
      - is_staff
      - is_superuser
      - profile
      - role_display
      - user_type
    AdminUsersResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/AdminManagedUser'
        count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        ordering:
          type: string
      required:
      - count
      - page
      - page_size
      - results
      - total_pages
    AppointmentRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        position:
          type: string
          format: uuid
        position_title:
          type: string
          readOnly: true
        nominee:
          type: string
          format: uuid
        nominee_name:
          type: string
          readOnly: true
        appointment_exercise:
          type: string
          format: uuid
          nullable: true
        nominated_by_user:
          type: string
          format: uuid
          nullable: true
        nominated_by_display:
          type: string
          maxLength: 200
        nominated_by_org:
          type: string
          maxLength: 200
        nomination_date:
          type: string
          format: date
        vetting_case:
          type: string
          format: uuid
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/AppointmentRecordStatusEnum'
          readOnly: true
        committee_recommendation:
          type: string
        final_decision_by_user:
          type: string
          format: uuid
          nullable: true
        final_decision_by_display:
          type: string
          maxLength: 200
        appointment_date:
          type: string
          format: date
          nullable: true
        gazette_number:
          type: string
          maxLength: 100
        gazette_date:
          type: string
          format: date
          nullable: true
        exit_date:
          type: string
          format: date
          nullable: true
        exit_reason:
          type: string
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - nominated_by_display
      - nomination_date
      - nominee
      - nominee_name
      - position
      - position_title
      - status
      - updated_at
    AppointmentRecordStatusEnum:
      enum:
      - nominated
      - under_vetting
      - committee_review
      - confirmation_pending
      - appointed
      - rejected
      - withdrawn
      - serving
      - exited
      type: string
      description: |-
        * `nominated` - Nominated
        * `under_vetting` - Under Vetting
        * `committee_review` - Committee Review
        * `confirmation_pending` - Awaiting Parliamentary Confirmation
        * `appointed` - Appointed
        * `rejected` - Rejected
        * `withdrawn` - Withdrawn
        * `serving` - Serving
        * `exited` - Exited
    ApprovalStage:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        template:
          type: string
          format: uuid
        order:
          type: integer
          maximum: 32767
          minimum: 0
        name:
          type: string
          maxLength: 100
        required_role:
          type: string
          maxLength: 50
        is_required:
          type: boolean
        maps_to_status:
          type: string
          maxLength: 50
