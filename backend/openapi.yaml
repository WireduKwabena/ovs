openapi: 3.0.3
info:
  title: AI Vetting System API
  version: 1.0.0
  description: API schema for campaign orchestration and vetting workflows.
paths:
  /api/admin/analytics/:
    get:
      operationId: admin_analytics_retrieve
      description: |-
        Detailed analytics for admin
        GET /api/admin/analytics/
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAnalyticsResponse'
          description: ''
  /api/admin/cases/:
    get:
      operationId: admin_cases_retrieve
      description: |-
        Get all cases for admin review
        GET /api/admin/cases/
        Supports filtering: ?status=pending&application_type=employment
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCasesResponse'
          description: ''
  /api/admin/dashboard/:
    get:
      operationId: admin_dashboard_retrieve
      description: |-
        Main admin dashboard with statistics
        GET /api/admin/dashboard/
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
          description: ''
  /api/ai-monitor/health/:
    get:
      operationId: ai_monitor_health_retrieve
      description: |-
        Runtime health snapshot for AI monitoring backend.

        Access:
        - authenticated admin/staff user, or
        - valid X-Service-Token header (matches SERVICE_TOKEN setting)
      parameters:
      - in: query
        name: model_name
        schema:
          type: string
          default: default
          minLength: 1
      tags:
      - ai-monitor
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/applications/cases/:
    get:
      operationId: applications_cases_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - applications
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVettingCaseList'
          description: ''
    post:
      operationId: applications_cases_create
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VettingCase'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VettingCase'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VettingCase'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VettingCase'
          description: ''
  /api/applications/cases/{id}/:
    get:
      operationId: applications_cases_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Vetting Case.
        required: true
      tags:
      - applications
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VettingCase'
          description: ''
    put:
      operationId: applications_cases_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Vetting Case.
        required: true
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VettingCase'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VettingCase'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VettingCase'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VettingCase'
          description: ''
    patch:
      operationId: applications_cases_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Vetting Case.
        required: true
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedVettingCase'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedVettingCase'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedVettingCase'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VettingCase'
          description: ''
    delete:
      operationId: applications_cases_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Vetting Case.
        required: true
      tags:
      - applications
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/applications/cases/{id}/upload-document/:
    post:
      operationId: applications_cases_upload_document_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Vetting Case.
        required: true
      tags:
      - applications
      requestBody:
        content:
