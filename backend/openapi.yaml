          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VettingCase'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VettingCase'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
