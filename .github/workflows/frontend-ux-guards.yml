name: Frontend UX Guards

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ux-guards.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ux-guards.yml"

jobs:
  ux-guards:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run UX Guard Test Suite
        run: npm run test:ux-guards

      - name: Type Check
        run: npm run type-check
