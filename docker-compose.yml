services:
  db:
    image: postgres:16-alpine
    container_name: ovs_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vetai_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vetai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ovs_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_init:
    image: ovs-redo-backend
    container_name: ovs_backend_init
    command: ["true"]   # exits immediately after entrypoint.sh finishes
    env_file:
      - backend/.env
    environment:
      RUN_INIT: "true"  
      DEBUG: ${DEBUG:-false}
      DJANGO_SETTINGS_MODULE: config.settings.development
      PYTHONDONTWRITEBYTECODE: "0"
      ENABLE_REALTIME: ${ENABLE_REALTIME:-false}
      POSTGRES_DB: ${POSTGRES_DB:-vetai_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_EAGER: "false"
      REDIS_URL: redis://redis:6379/0        # add this
      CHANNELS_REDIS_URL: redis://redis:6379/0  # add this too, matches prod
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
      DJANGO_SUPERUSER_FIRST_NAME: ${DJANGO_SUPERUSER_FIRST_NAME:-System}
      DJANGO_SUPERUSER_LAST_NAME: ${DJANGO_SUPERUSER_LAST_NAME:-Admin}
      DJANGO_SUPERUSER_RESET_PASSWORD: ${DJANGO_SUPERUSER_RESET_PASSWORD:-false}
    volumes:
      - ./backend:/app
      - logs_data:/app/logs
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    image: ovs-redo-backend
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ovs_backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 300 --preload
    env_file:
      - backend/.env
    environment:
      RUN_INIT: "false"  # ← skips init, goes straight to gunicorn
      DEBUG: ${DEBUG:-false}
      DJANGO_SETTINGS_MODULE: config.settings.development
      PYTHONDONTWRITEBYTECODE: "0"
      ENABLE_REALTIME: ${ENABLE_REALTIME:-false}
      POSTGRES_DB: ${POSTGRES_DB:-vetai_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_EAGER: "false"
      REDIS_URL: redis://redis:6379/0        # add this
      CHANNELS_REDIS_URL: redis://redis:6379/0  # add this too, matches prod
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      backend_init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ovs_celery_worker
    command: celery -A config.celery:app worker -l info -E --concurrency=2
    env_file:
      - backend/.env
    environment:
      RUN_INIT: "false"
      DEBUG: ${DEBUG:-false}
      DJANGO_SETTINGS_MODULE: config.settings.development
      PYTHONDONTWRITEBYTECODE: "0"
      ENABLE_REALTIME: ${ENABLE_REALTIME:-false}
      POSTGRES_DB: ${POSTGRES_DB:-vetai_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_EAGER: "false"
      REDIS_URL: redis://redis:6379/0        # add this
      CHANNELS_REDIS_URL: redis://redis:6379/0  # add this too, matches prod
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - logs_data:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A config.celery:app inspect ping -d celery@$$HOSTNAME --timeout=5 | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ovs_celery_beat
    command: celery -A config.celery:app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - backend/.env
    environment:
      RUN_INIT: "false"
      DEBUG: ${DEBUG:-false}
      DJANGO_SETTINGS_MODULE: config.settings.development
      PYTHONDONTWRITEBYTECODE: "0"
      ENABLE_REALTIME: ${ENABLE_REALTIME:-false}
      POSTGRES_DB: ${POSTGRES_DB:-vetai_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_EAGER: "false"
      REDIS_URL: redis://redis:6379/0        # add this
      CHANNELS_REDIS_URL: redis://redis:6379/0  # add this too, matches prod
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - logs_data:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys;sys.exit(0 if any('celery' in p.read_text(errors='ignore') and 'beat' in p.read_text(errors='ignore') for p in pathlib.Path('/proc').glob('[0-9]*/cmdline')) else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ovs_flower
    command: >
      sh -c 'if [ "$$FLOWER_REQUIRE_AUTH" = "true" ] && [ -n "$$APP_FLOWER_BASIC_AUTH" ]; then
               celery -A config.celery:app flower --port=$${FLOWER_PORT:-5555} --basic_auth="$$APP_FLOWER_BASIC_AUTH";
             else
               celery -A config.celery:app flower --port=$${FLOWER_PORT:-5555};
             fi'
    env_file:
      - backend/.env
    environment:
      RUN_INIT: "false"  
      DEBUG: ${DEBUG:-false}
      DJANGO_SETTINGS_MODULE: config.settings.development
      PYTHONDONTWRITEBYTECODE: "0"
      ENABLE_REALTIME: ${ENABLE_REALTIME:-false}
      POSTGRES_DB: ${POSTGRES_DB:-vetai_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_EAGER: "false"
      REDIS_URL: redis://redis:6379/0        # add this
      CHANNELS_REDIS_URL: redis://redis:6379/0  # add this too, matches prod
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLOWER_PORT: ${FLOWER_PORT:-5555}
      FLOWER_REQUIRE_AUTH: ${FLOWER_REQUIRE_AUTH:-false}
      APP_FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-}
    volumes:
      - ./backend:/app
      - logs_data:/app/logs
    ports:
      - "5555:5555"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1', 5555), timeout=5); s.close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: ovs_frontend
    working_dir: /workspace
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_API_URL: http://backend:8000/api/v1
      VITE_WS_URL: ws://backend:8000
    command: >
      sh -c 'LOCK_HASH="$$(sha256sum package-lock.json | awk "{print $$1}")";
             CACHED_HASH="$$(cat node_modules/.package-lock.hash 2>/dev/null || true)";
             if [ "$$LOCK_HASH" != "$$CACHED_HASH" ] || [ ! -d node_modules ] || [ ! -f node_modules/.package-lock.hash ]; then
               npm ci && echo "$$LOCK_HASH" > node_modules/.package-lock.hash;
             fi;
             npm run dev -- --host 0.0.0.0 --port 3000'
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  media_data:
  logs_data:
  frontend_node_modules:
